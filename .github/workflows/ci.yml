name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '**.md'
      - 'screenshot.png'
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: Install
        run: pip install -r requirements.txt
      - name: Import check
        run: python -c "import sys; sys.path.insert(0,'.'); import ai_engine; import rag_engine; from flask import Flask; import numpy; print('All imports OK')"
      - name: Lint
        run: pip install flake8 && flake8 . --count --select=E9,F63,F7,F82 --statistics

  docker:
    name: Docker
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: docker compose build

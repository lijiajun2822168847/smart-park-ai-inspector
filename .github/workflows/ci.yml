name: CI
on:
  push:
    branches: [main]
    paths-ignore: ['docs/**', '**.md', 'screenshot.png']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - run: pip install -r requirements.txt
      - run: pip install flake8
      - run: python -c "import sys; sys.path.insert(0,'.'); from flask import Flask; import numpy; print('basic ok')"
      - run: flake8 . --count --select=E9,F63,F7,F82 --statistics

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker compose build

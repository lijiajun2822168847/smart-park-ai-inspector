name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '**.md'
      - 'screenshot.png'
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: Install
        run: pip install -r requirements.txt
      - name: Import check
        run: python -c "
import sys; sys.path.insert(0,'.')
# 测试基础模块（不需要API Key）
from flask import Flask; print('OK: flask')
import numpy; print('OK: numpy')
# 测试AI模块（捕获API Key缺失错误）
try: import ai_engine; print('OK: ai_engine')
except Exception as e: print('SKIP: ai_engine -', e)
try: import rag_engine; print('OK: rag_engine')
except Exception as e: print('SKIP: rag_engine -', e)
"
      - name: Lint
        run: pip install flake8 && flake8 . --count --select=E9,F63,F7,F82 --statistics

  docker:
    name: Docker
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: docker compose build

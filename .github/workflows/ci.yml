name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '**.md'
      - 'screenshot.png'
  pull_request:
    branches: [main]
  workflow_dispatch:  # 允许手动触发

jobs:
  lint:
    name: 🧹 Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: 🔍 Run flake8
        run: |
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=120 --statistics

  test:
    name: 🧪 Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: 🔬 Test import (无 API Key 时验证导入)
        run: |
          echo "Testing module imports..."
          python -c "
import sys
sys.path.insert(0, '.')
# 测试核心模块能正常导入
try:
    import ai_engine
    print('✅ ai_engine OK')
except Exception as e:
    print(f'⚠️ ai_engine: {e}')
try:
    import rag_engine
    print('✅ rag_engine OK')
except Exception as e:
    print(f'⚠️ rag_engine: {e}')
try:
    from flask import Flask
    print('✅ flask OK')
except ImportError as e:
    print(f'❌ flask: {e}')
"

      - name: 🏗️ Test Docker build
        if: github.ref == 'refs/heads/main'
        run: |
          docker build -t smart-park-ai-inspector .
          echo "✅ Docker image built successfully"

  docker:
    name: 🐳 Docker Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 🏗️ Build Docker image
        run: |
          docker compose build
          echo "✅ Docker Compose build successful"

  badge:
    name: 🏷️ Update Badges
    runs-on: ubuntu-latest
    needs: [lint, test, docker]
    if: github.ref == 'refs/heads/main' && success()
    steps:
      - name: ✅ All checks passed
        run: |
          echo "🎉 All CI checks passed for commit ${{ github.sha }}"
          echo "📦 Repo: ${{ github.repository }}"
          echo "🌐 https://github.com/${{ github.repository }}/actions"